name: LinkedIn Job Scraper

on:
  workflow_dispatch:
    inputs:
      job_url:
        description: 'LinkedIn jobs search URL'
        required: true
        default: 'https://www.linkedin.com/jobs/search/?f_TPR=r3600&f_WT=2&geoId=92000000&keywords=AI&origin=JOB_SEARCH_PAGE_JOB_FILTER&refresh=true&sortBy=DD'

  schedule:
    # Run hourly at the 0 minute
    - cron: '0 * * * *'

permissions:
  contents: write

jobs:
  fetch-jobs:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          # Using your PAT here makes it the default credential for all git operations
          token: ${{ secrets.GH_PAT }}
          persist-credentials: true 

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Update private dependency
        env:
          GH_PAT: ${{ secrets.GH_PAT }}
        run: |
          # Map the SSH URL in your lockfile to an HTTPS URL using your PAT
          git config --global url."https://x-access-token:${GH_PAT}@github.com/anushalihala/linkedin_notifications.git".insteadOf "git+ssh://git@github.com/anushalihala/linkedin_notifications.git"
          
          # Install and force update the specific package
          npm install
          npm update @anusha/linkedin-notifications

      - name: Commit and push lockfile if changed
        run: |
          if [[ -n "$(git status --porcelain package-lock.json)" ]]; then
            echo "New version detected. Updating lockfile..."
            git config --global user.name 'github-actions[bot]'
            git config --global user.email 'github-actions[bot]@users.noreply.github.com'
            git add package-lock.json
            git commit -m "chore: auto-update linkedin-notifications dependency"
            git push
          else
            echo "Dependency is already up to date."
          fi

      - name: Run LinkedIn job scraper
        env:
          LINKEDIN_JOB_URL: ${{ github.event.inputs.job_url || secrets.LINKEDIN_JOB_URL || 'https://www.linkedin.com/jobs/search/?f_TPR=r3600&f_WT=2&geoId=92000000&keywords=AI&origin=JOB_SEARCH_PAGE_JOB_FILTER&refresh=true&sortBy=DD' }}
          LINKEDIN_LI_AT: ${{ secrets.LINKEDIN_LI_AT }}
          LINKEDIN_JSESSIONID: ${{ secrets.LINKEDIN_JSESSIONID }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          FIREBASE_CREDENTIALS: ${{ secrets.FIREBASE_CREDENTIALS }}
          EMAIL_USER: ${{ secrets.EMAIL_USER }}
          EMAIL_PASSWORD: ${{ secrets.EMAIL_PASSWORD }}
          LOG_LEVEL: ${{ secrets.LOG_LEVEL }}
          BATCH_CHUNK_SIZE: ${{ secrets.BATCH_CHUNK_SIZE }}
        run: npm start
